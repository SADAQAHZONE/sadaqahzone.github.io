<!DOCTYPE html>
<html>
<head>
    <title>Sadaqah Zone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Top Green Header */
        .header {
            background: linear-gradient(to right, #3cb371, #66cdaa);
            padding: 20px;
            height: 120px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 140px;
        }

        /* Main Content Area */
        .content {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2e8b57;
        }
        .donate-section {
    text-align: right;
    padding: 20px 40px;
}

.donate-btn {
    background-color: #3cb371;
    color: white;
    padding: 18px 40px;   /* bigger */
    font-size: 20px;      /* bigger text */
    font-weight: bold;
    text-decoration: none;
    border-radius: 50px;
    transition: 0.3s ease;
}
@keyframes flash {
    0% { box-shadow: 0 0 5px #3cb371; }
    50% { box-shadow: 0 0 25px #3cb371; }
    100% { box-shadow: 0 0 5px #3cb371; }
}

.donate-btn {
    animation: flash 1.5s infinite;
}
.donate-btn:hover {
    background-color: #2e8b57;
    transform: scale(1.05);
}
    </style>
</head>

<body>

    <div class="header">
        <img src="logo.png" class="logo">
    </div>
    <div class="donate-section">
    <a href="donate.html" class="donate-btn"> DONATE NOW</a>
</div>

    <div class="content">
        <h1>Welcome to Sadaqah Zone</h1>
        <p>Together we make a difference.</p>
    </div>

</body>
</html>
