<!DOCTYPE html>
<html>
<head>
    <title>Sadaqah Zone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Top Green Header */
        .header {
            background: linear-gradient(to right, #3cb371, #66cdaa);
            padding: 20px;
            height: 120px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 120px;
        }

        h1 {
            color: #2e8b57;
        }

        .donate-section {
            text-align: right;
            padding: 20px 40px;
        }

        /* ===== DONATE BUTTON CLEAN VERSION ===== */
        .donate-btn {
            background-color: #3cb371;
            color: white;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            display: block;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            transition: 0.3s ease;
            animation: flash 1.8s infinite;
        }

        @keyframes flash {
            0% { box-shadow: 0 0 5px #3cb371; }
            50% { box-shadow: 0 0 20px #3cb371; }
            100% { box-shadow: 0 0 5px #3cb371; }
        }

        .donate-btn:hover {
            background-color: #2e8b57;
            transform: scale(1.03);
        }

        .main-section {
            display: flex;
            padding: 40px;
        }

        .left-side {
            flex: 3;
            padding-right: 30px;
        }

        .right-side {
            flex: 1;
            border-left: 3px solid #2e8b57;
            padding-left: 30px;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .category {
            background-color: #e6f5ec;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .fund-box {
            background-color: #f9f9f9;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            border-radius: 10px;
        }

        .fund-box p {
            font-size: 22px;
            font-weight: bold;
            color: #2e8b57;
        }

        /* Swiper styles */
        .swiper {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        /* ===== MOBILE RESPONSIVE FIX ===== */
        @media (max-width: 768px) {

            .main-section {
                flex-direction: column;
                padding: 20px;
            }

            .left-side {
                padding-right: 0;
            }

            .right-side {
                border-left: none;
                border-top: 3px solid #2e8b57;
                padding-left: 0;
                padding-top: 20px;
                position: static;
            }

            .swiper {
                height: 180px;
            }

            .donate-btn {
                width: 100%;
                display: block;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="logo.png" class="logo" alt="Logo">
    </div>

    <!-- MAIN SECTION -->
    <div class="main-section">

        <!-- LEFT SIDE -->
        <div class="left-side">
            <h1>Welcome, Together we make a difference</h1>

            <!-- LEFT SLIDER -->
            <div class="swiper left-swiper">
              <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="pic1.jpg" alt="Pic 1"></div>
                <div class="swiper-slide"><img src="pic2.jpg" alt="Pic 2"></div>
                <div class="swiper-slide"><img src="pic3.jpg" alt="Pic 3"></div>
              </div>
              <div class="swiper-button-next left-next"></div>
              <div class="swiper-button-prev left-prev"></div>
            </div>

            <h2>Palestine Project</h2>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right-side">

            <!-- RIGHT SLIDER -->
            <div class="swiper right-swiper">
              <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="pic4.jpg" alt="Pic 4"></div>
                <div class="swiper-slide"><img src="pic5.jpg" alt="Pic 5"></div>
                <div class="swiper-slide"><img src="pic6.jpg" alt="Pic 6"></div>
              </div>
              <div class="swiper-button-next right-next"></div>
              <div class="swiper-button-prev right-prev"></div>
            </div>

            <a href="donate.html" class="donate-btn">DONATE NOW</a>

            <div class="category">Emergency</div>
            <div class="category">Education</div>

            <div class="fund-box">
                <h3>Total Fund</h3>
                <p>€45,000</p>
            </div>

        </div>

    </div>

    <!-- SWIPER INIT -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
      const leftSwiper = new Swiper('.left-swiper', {
          loop: true,
          autoplay: { delay: 3000 },
          slidesPerView: 1,
          navigation: {
            nextEl: '.left-next',
            prevEl: '.left-prev',
          },
      });

      const rightSwiper = new Swiper('.right-swiper', {
          loop: true,
          autoplay: { delay: 3000 },
          slidesPerView: 1,
          navigation: {
            nextEl: '.right-next',
            prevEl: '.right-prev',
          },
      });
    </script>

</body>
</html>
