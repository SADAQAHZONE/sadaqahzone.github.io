<!DOCTYPE html>
<html>
<head>
    <title>Sadaqah Zone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Top Green Header */
        .header {
            background: linear-gradient(to right, #3cb371, #66cdaa);
            padding: 20px;
            height: 100px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 80px;
        }

        /* Main Content Area */
        .content {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2e8b57;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="logo.png" class="logo">
    </div>

    <div class="content">
        <h1>Welcome to Sadaqah Zone</h1>
        <p>Together we make a difference.</p>
    </div>

</body>
</html>
