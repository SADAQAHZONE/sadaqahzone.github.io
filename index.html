<!DOCTYPE html>
<html>
<head>
    <title>Sadaqah Zone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Top Green Header */
        .header {
            background: linear-gradient(to right, #3cb371, #66cdaa);
            padding: 20px;
            height: 120px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 120px;
        }

        /* Main Content Area */
        .content {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2e8b57;
        }
        .donate-section {
    text-align: right;
    padding: 20px 40px;
}

/* ===== DONATE BUTTON CLEAN VERSION ===== */
.donate-btn {
    background-color: #3cb371;
    color: white;
    padding: 18px 20px;      /* reduced horizontal padding */
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
    border-radius: 8px;      /* match category boxes */
    display: block;          /* makes full width */
    width: 100%;             /* aligns with Emergency/Education */
    text-align: center;
    box-sizing: border-box;
    transition: 0.3s ease;
    animation: flash 1.8s infinite;
}

/* Flash glow */
@keyframes flash {
    0% { box-shadow: 0 0 5px #3cb371; }
    50% { box-shadow: 0 0 20px #3cb371; }
    100% { box-shadow: 0 0 5px #3cb371; }
}

.donate-btn:hover {
    background-color: #2e8b57;
    transform: scale(1.03);
}
        .main-section {
    display: flex;
    padding: 40px;
}

.left-side {
    flex: 3;
    padding-right: 30px;
}

.right-side {
    flex: 1;
    border-left: 3px solid #2e8b57;
    padding-left: 30px;
    position: sticky;
    top: 20px;
    height: fit-content;
}

.slider {
    background-color: #f2f2f2;
    height: 250px;
    margin: 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
}

.category {
    background-color: #e6f5ec;
    padding: 15px;
    margin: 15px 0;
    text-align: center;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.fund-box {
    background-color: #f9f9f9;
    padding: 20px;
    margin-top: 20px;
    text-align: center;
    border-radius: 10px;
}

.fund-box p {
    font-size: 22px;
    font-weight: bold;
    color: #2e8b57;
}
        /* ===== MOBILE RESPONSIVE FIX ===== */
@media (max-width: 768px) {

    .main-section {
        flex-direction: column;
        padding: 20px;
    }

    .left-side {
        padding-right: 0;
    }

    .right-side {
        border-left: none;
        border-top: 3px solid #2e8b57;
        padding-left: 0;
        padding-top: 20px;
        position: static;
    }

    .slider {
        height: 180px;
    }

    .donate-btn {
        width: 100%;
        display: block;
        text-align: center;
    }
}
    </style>
</head>

<body>

    <div class="header">
        <img src="logo.png" class="logo">
    </div>

    <div class="main-section">

    <!-- LEFT SIDE -->
    <div class="left-side">
        <h1>Welcome, Together we make a difference</h1>

        <div class="slider">
            <p>Picture Slide 1</p>
        </div>

        <div class="slider">
            <p>Picture Slide 2</p>
        </div>

        <h2>Palestine Project</h2>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">

        <a href="donate.html" class="donate-btn">DONATE NOW</a>

        <div class="category">Emergency</div>
        <div class="category">Education</div>

        <div class="fund-box">
            <h3>Total Fund</h3>
            <p>€45,000</p>
        </div>

    </div>

</div>

</body>
</html>
